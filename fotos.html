<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix - Galería de Momentos</title>
    <link rel="shortcut icon" href="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2016.ico">
    <style>
        :root {
            --bg-black: #141414;
            --netflix-red: #E50914;
            --text-white: #FFFFFF;
            --text-gray: #a3a3a3;
            --netflix-transition: all 0.4s cubic-bezier(0.5, 0, 0.1, 1);
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Animación de entrada para correlación */
            animation: fadeInPage 1.2s ease-out;
        }

        @keyframes fadeInPage {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* HEADER (Idéntico a seccion-nosotros) */
        header {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.9) 0%, transparent 100%);
            z-index: 1000; display: flex; align-items: center; padding: 0 4%;
            box-sizing: border-box;
        }
        .logo { width: 95px; cursor: pointer; transition: 0.3s; }
        .logo:hover { transform: scale(1.05); }

        /* SECCIÓN DE TÍTULO */
        .gallery-intro {
            margin-top: 120px;
            padding: 0 4%;
            max-width: 800px;
        }
        .gallery-intro h2 { 
            color: #46d369; 
            margin-bottom: 10px; 
            font-size: 1.2rem;
        }
        .gallery-intro h1 { 
            font-size: clamp(2rem, 5vw, 3.5rem); 
            margin: 0; 
            font-weight: 700;
        }
        .gallery-intro p { 
            color: var(--text-gray); 
            font-size: 1.1rem; 
            line-height: 1.5;
            margin-top: 15px;
        }

        /* GRID ESTILO EPISODIOS */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px 15px;
            padding: 40px 4%;
        }

        .episode-card {
            cursor: pointer;
            text-decoration: none;
            color: white;
            transition: var(--netflix-transition);
        }

        .img-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            border-radius: 4px;
            overflow: hidden;
            background: #2a2a2a;
            margin-bottom: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        /* Barra de progreso roja "Visto" */
        .progress-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 4px;
            width: 100%;
            background: rgba(255,255,255,0.3);
        }
        .progress-fill {
            height: 100%;
            width: 100%; /* Marcamos como visto al 100% */
            background: var(--netflix-red);
        }

        /* Hover de la card */
        .episode-card:hover .img-container {
            transform: scale(1.05);
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
        }
        .episode-card:hover img {
            filter: brightness(1.1);
        }

        .episode-meta {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            font-size: 0.9rem;
        }
        .episode-number { color: white; }
        .episode-duration { color: var(--text-gray); }

        /* BOTÓN VOLVER (Estilo Netflix) */
        .back-btn {
            display: inline-block;
            margin-top: 20px;
            background: white;
            color: black;
            padding: 10px 25px;
            border-radius: 4px;
            font-weight: bold;
            text-decoration: none;
            transition: 0.3s;
        }
        .back-btn:hover { background: rgba(255,255,255,0.8); }

        @media (max-width: 600px) {
            .gallery-grid { grid-template-columns: repeat(1, 1fr); }
            .gallery-intro h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <header>
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo" onclick="window.location.href='index.html'">
    </header>

    <div class="gallery-intro">
        <h2>99% de coincidencia</h2>
        <h1>Temporada 1: Galería de Recuerdos</h1>
        <p>Explora cada fotograma de nuestra serie original. Desde el primer "hola" hasta el último momento juntos. Cada imagen es un episodio que volveríamos a ver mil veces.</p>
        <a href="perfil-nosotros.html" class="back-btn">← Volver a la pantalla principal</a>
    </div>

    <div class="gallery-grid">
        
        <script>
            // Generamos las 26 fotos automáticamente para no ensuciar el código
            for(let i=1; i<=26; i++) {
                document.write(`
                    <div class="episode-card">
                        <div class="img-container">
                            <img src="fotos/Sergio y Yani/${i}.jpg" alt="Recuerdo ${i}">
                            <div class="progress-bar"><div class="progress-fill"></div></div>
                        </div>
                        <div class="episode-meta">
                            <span class="episode-number">${i}. Capítulo ${i}</span>
                            <span class="episode-duration">${Math.floor(Math.random() * 10) + 20}m</span>
                        </div>
                    </div>
                `);
            }
        </script>

    </div>

    <footer style="padding: 60px 4%; text-align: left; color: var(--text-gray); font-size: 0.8rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 40px;">
        <p>Sergio & Yanira Original Content © 2024</p>
    </footer>

</body>
</html>
