<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Netflix</title>
    <link rel="shortcut icon" href="https://assets.nflxext.com/us/ffe/siteui/common/icons/nficon2016.ico">
    <style>
        :root { --bg-color: #141414; --text-color: #fff; --gray: #808080; }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Logo de Netflix arreglado */
        .logo-container {
            position: absolute;
            top: 30px;
            left: 50px;
        }
        .logo-img {
            width: 120px;
            height: auto;
        }

        h1 { 
            font-size: 3.5vw; 
            font-weight: 500; 
            margin-bottom: 30px; 
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .profile-container { display: flex; justify-content: center; }

        .profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.4s ease;
            text-decoration: none;
        }

        .img-box {
            width: 180px; height: 180px;
            border-radius: 4px; overflow: hidden;
            border: 4px solid transparent;
            transition: border 0.3s ease;
        }

        .profile:hover .img-box { border: 4px solid white; }
        .profile:hover p { color: white; }
        
        .profile img { width: 100%; height: 100%; object-fit: cover; }
        
        .profile p { 
            margin-top: 20px; 
            color: var(--gray); 
            font-size: 1.8vw; 
            transition: 0.3s; 
        }

        .manage-btn {
            margin-top: 60px;
            background: transparent;
            border: 1px solid var(--gray);
            color: var(--gray);
            padding: 10px 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.1vw;
            cursor: pointer;
            transition: 0.3s;
        }
        .manage-btn:hover { border-color: white; color: white; }

        /* Capa de Transición */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 1000; opacity: 0; pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .fade-in { opacity: 1 !important; }
        .zoom-out { transform: scale(1.2); opacity: 0; transition: 0.6s ease; }
    </style>
</head>
<body>

<div id="overlay"></div>

<div class="logo-container">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" alt="Netflix" class="logo-img">
</div>

<h1>¿Quién está viendo ahora?</h1>

<div class="profile-container">
    <div class="profile" onclick="entrar(this, 'seccion-nosotros.html')">
        <div class="img-box">
            <img src="fotos/Sergio y Yani/1.jpg" alt="Yanira y Sergio">
        </div>
        <p>Yanira y Sergio</p>
    </div>
</div>

<button class="manage-btn">Administrar perfiles</button>

<script>
    function entrar(elemento, url) {
        document.getElementById('overlay').classList.add('fade-in');
        elemento.classList.add('zoom-out');
        setTimeout(() => {
            window.location.href = url;
        }, 600);
    }
</script>

</body>
</html>
